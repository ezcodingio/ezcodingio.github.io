<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <main>{{ block "main" . }}{{ end }}</main>
  {{ partial "footer.html" . }}
  <script>
    for (const a of document.querySelectorAll("a[data-u][data-d]")) {
      const e = a.dataset.u + "@" + a.dataset.d;
      a.href = "mailto:" + e;
      a.textContent = e;
      a.removeAttribute("data-u");
      a.removeAttribute("data-d");
    }
  </script>
</body>
</html>
