<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.Title }}</title>
  <meta name="description" content="{{ site.Params.description }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <meta property="og:title" content="{{ site.Title }}">
  <meta property="og:description" content="{{ site.Params.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ "og-image.png" | absURL }}">
  <meta name="twitter:card" content="summary_large_image">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1412">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="preload" href="/fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin>
  {{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
  {{ end }}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "EasyCoding",
    "url": {{ site.BaseURL }},
    "description": {{ site.Params.description }},
    "sameAs": [{{ site.Params.github }}]
  }
  </script>
  {{ if eq hugo.Environment "production" }}{{ partial "cloudflare-analytics.html" . }}{{ end }}
</head>
